<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Agent - Prompt Injection Security PoC</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      margin-bottom: 20px;
    }
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #0056b3;
    }
    pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-top: 20px;
    }
    .error {
      color: #dc3545;
    }
    .reasoning {
      margin-top: 20px;
    }
    .reasoning h2 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #495057;
    }
    .reasoning pre {
      background: #e9ecef;
      color: #212529;
    }
  </style>
</head>
<body>
  <h1>Issue Agent - Prompt Injection Security PoC</h1>
  <textarea id="issueInput" rows="10" placeholder="Paste simulated issue content here..."></textarea>
  <button id="processBtn">Process</button>
  <pre id="output"></pre>
  <div class="reasoning" id="reasoningSection" style="display: none;">
    <h2>Model Reasoning:</h2>
    <pre id="reasoningOutput"></pre>
  </div>

  <script>
    const issueInput = document.getElementById('issueInput');
    const processBtn = document.getElementById('processBtn');
    const output = document.getElementById('output');
    const reasoningSection = document.getElementById('reasoningSection');
    const reasoningOutput = document.getElementById('reasoningOutput');

    processBtn.addEventListener('click', async () => {
      const issueContent = issueInput.value.trim();

      if (!issueContent) {
        output.textContent = 'Please enter some issue content.';
        return;
      }

      processBtn.disabled = true;
      output.textContent = 'Processing...';

      try {
        const response = await fetch('/process', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ issueContent }),
        });

        const result = await response.json();

        if (response.ok) {
          const responseText = result.response;
          
          // Validate response structure
          if (!responseText.includes('<title>') || 
              !responseText.includes('<summary>') || 
              !responseText.includes('<action>')) {
            output.textContent = 'Error: Model response does not contain required tags (title, summary, action)';
            output.classList.add('error');
            reasoningSection.style.display = 'none';
          } else {
            output.textContent = responseText;
            output.classList.remove('error');
            
            // Display reasoning if available
            if (result.reasoning) {
              reasoningOutput.textContent = result.reasoning;
              reasoningSection.style.display = 'block';
            } else {
              reasoningSection.style.display = 'none';
            }
          }
        } else {
          output.textContent = 'Error: ' + (result.error || 'Unknown error');
          output.classList.add('error');
          reasoningSection.style.display = 'none';
        }
      } catch (error) {
        output.textContent = 'Error: ' + error.message;
        output.classList.add('error');
      } finally {
        processBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
